<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Energy Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

header{
    padding:15px;
    background:#111c36;
    display:flex;
    justify-content:space-between;
}

.container{
    padding:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    padding:8px;
    border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<header>
    ⚡ Energy Monitor Pro
    <button onclick="exportCSV()">Export CSV</button>
</header>

<div class="container">

<div class="card">
    <canvas id="chart"></canvas>
</div>

<div class="card">
    <h3>Historique</h3>
    <table>
        <thead>
            <tr>
                <th>Heure</th>
                <th>V</th>
                <th>I</th>
                <th>P</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const firebaseConfig = {
  apiKey: "XXX",
  databaseURL: "https://energy-upl-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "energy-upl"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const mesuresRef = ref(db, "mesures");

let dataGlobal = [];

const chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Puissance (W)",
            data: [],
            borderColor: "#38bdf8"
        }]
    }
});

onValue(mesuresRef, (snapshot) => {

    const data = snapshot.val();
    if(!data) return;

    dataGlobal = Object.values(data);

    render();
});

function render(){

    const table = document.getElementById("table");
    table.innerHTML = "";

    let labels = [];
    let values = [];

    const last = dataGlobal.slice(-20);

    last.forEach(d => {

        table.innerHTML += `
        <tr>
            <td>${d.timestamp}</td>
            <td>${d.voltage}</td>
            <td>${d.courant}</td>
            <td>${d.puissance}</td>
        </tr>`;

        labels.push(d.timestamp);
        values.push(d.puissance);
    });

    chart.data.labels = labels;
    chart.data.datasets[0].data = values;
    chart.update();
}

window.exportCSV = function(){

    let csv = "Timestamp,Voltage,Current,Power\n";

    dataGlobal.forEach(d => {
        csv += `${d.timestamp},${d.voltage},${d.courant},${d.puissance}\n`;
    });

    const blob = new Blob([csv], {type:"text/csv"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "energy_data.csv";
    a.click();
}

</script>

</body>
</html>
