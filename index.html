<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title> Control Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
	  * {
  box-sizing: border-box;
}

body {
  font-family: "Segoe UI", Roboto, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #fff;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* TITLE */
h1 {
  text-align: center;
  margin-top: 30px;
  font-size: 2rem;
  font-weight: 600;
}

/* LOGIN */
#loginForm {
  max-width: 400px;
  margin: 80px auto;
  padding: 30px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

#loginForm input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

#loginForm button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

#loginForm button:hover {
  background: #2563eb;
}

/* DASHBOARD */
#dashboard {
  display: none;
}

.relay-container {
  max-width: 1000px;
  margin: 30px auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

/* CARD */
.relay-card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(8px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  text-align: center;
  transition: transform 0.2s;
}

.relay-card:hover {
  transform: translateY(-5px);
}

.relay-card h2 {
  margin-bottom: 10px;
}

.relay-card p {
  margin-bottom: 15px;
}

/* BUTTON */
.relay-card button {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

/* GLOBAL BUTTONS */
#allOffBtn {
  background: #ef4444;
}

#logoutBtn {
  background: #6b7280;
}

#allOffBtn, #logoutBtn {
  width: 250px;
  margin: 10px auto;
  padding: 12px;
  border-radius: 10px;
  border: none;
  color: white;
  display: block;
  cursor: pointer;
  transition: 0.3s;
}

#allOffBtn:hover {
  background: #dc2626;
}

#logoutBtn:hover {
  background: #4b5563;
}

/* FOOTER */
.footer {
  margin-top: auto;
  background: rgba(0,0,0,0.4);
  padding: 15px;
  text-align: center;
  font-size: 14px;
  color: #ccc;
  border-top: 1px solid rgba(255,255,255,0.1);
}
  </style>
</head>
<body>
<h1>Control Dashboard</h1>
  <!-- Login form -->
  <div id="loginForm">
    <input type="email" id="email" placeholder="Enter Email" required />
    <input type="password" id="password" placeholder="Enter Password" required />
    <button id="loginBtn">Login</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="relay-container">
      <div class="relay-card">
        <h2>Lampe salon</h2>
        <p>Status: <span id="status1">Loading...</span></p>
        <button id="btn4">ON / OFF</button>
      </div>

      <div class="relay-card">
        <h2>Lampe chambre</h2>
        <p>Status: <span id="status2">Loading...</span></p>
        <button id="btn4">ON / OFF</button>
      </div>

      <div class="relay-card">
        <h2>Prise salon</h2>
        <p>Status: <span id="status3">Loading...</span></p>
        <button id="btn4">ON / OFF</button>
      </div>

      <div class="relay-card">
        <h2>Prise chambre</h2>
        <p>Status: <span id="status4">Loading...</span></p>
        <button id="btn4">ON / OFF</button>
      </div>
    </div>

    <button id="allOffBtn">All OFF</button>
    <button id="btn4">ON / OFF</button>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
    apiKey: "AIzaSyDI5kGc8vX3JvOnI03IHPWRrvpwywp-ZEQ",
    authDomain: "home-smart-e7d24.firebaseapp.com",
    databaseURL: "https://home-smart-e7d24-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "home-smart-e7d24",
    storageBucket: "home-smart-e7d24.firebasestorage.app",
    messagingSenderId: "233750784705",
    appId: "1:233750784705:web:cdcd0b5a4af63227b70240"
};

    firebase.initializeApp(firebaseConfig);

    // Predefined login credentials (can be replaced with your logic)
    const allowedEmail = "mstech5000@gmail.com";
    const allowedPassword = "mstech5000";

    const loginForm = document.getElementById("loginForm");
    const dashboard = document.getElementById("dashboard");
    const loginBtn = document.getElementById("loginBtn");

    loginBtn.addEventListener("click", () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Please enter email and password.");
        return;
      }

      // Check hardcoded credentials first
      if(email === allowedEmail && password === allowedPassword){
        // Sign in with Firebase
        firebase.auth().signInWithEmailAndPassword(email, password)
          .then(userCredential => {
            console.log("Signed in as", userCredential.user.email);
            loginForm.style.display = "none";
            dashboard.style.display = "block";
            startRelayControl();
          })
          .catch(error => {
            alert("Firebase login failed: " + error.message);
          });
      } else {
        alert("Invalid email or password.");
      }
    });

    function startRelayControl() {
      const db = firebase.database();

      const relays = [
        { id: 1, path: "relay1" },
        { id: 2, path: "relay2" },
        { id: 3, path: "relay3" },
        { id: 4, path: "relay4" },
      ];

      relays.forEach(relay => {
        const statusText = document.getElementById(`status${relay.id}`);
        const toggleButton = document.getElementById(`btn${relay.id}`);
        const relayRef = db.ref("/" + relay.path);

        relayRef.on("value", (snapshot) => {
          const state = snapshot.val();
          statusText.innerText = state ? "ON" : "OFF";
          toggleButton.style.backgroundColor = state ? "green" : "red";
        });

        toggleButton.onclick = () => {
          relayRef.get().then(snap => {
            relayRef.set(!snap.val());
          });
        };
      });

      document.getElementById("allOffBtn").onclick = () => {
        relays.forEach(relay => {
          db.ref("/" + relay.path).set(false);
        });
      };
    }

    document.getElementById("logoutBtn").onclick = () => {
      firebase.auth().signOut()
        .then(() => {
          dashboard.style.display = "none";
          loginForm.style.display = "block";
          document.getElementById("email").value = "";
          document.getElementById("password").value = "";
        })
        .catch(error => {
          alert("Logout failed: " + error.message);
        });
    };
  </script>
	<footer class="footer">
  <p>Site développé par MS TECH.</p>
  <p>© 2026 Tous droits réservés</p>
</footer>
</body>
</html>
